---
- name: Configure prerequisite all nodes
  hosts: all
  become: true

  roles:
    - common

- name: Configure Control Node
  hosts: controls
  become: true

  roles:
    - prometheus
    - grafana
    - elastic_stack
    - kibana
    - alert_manager

- name: Configure Targer Nodes
  hosts: nodes
  become: true

  roles:
    - node_exporter
    - elastic_agent