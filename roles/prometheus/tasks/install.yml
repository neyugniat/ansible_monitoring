---
- name: Check if Prometheus is installed
  ansible.builtin.stat:
    path: "{{ prometheus_bin_dir }}/prometheus"
  register: prometheus_binary

- name: Install Prometheus
  when: not prometheus_binary.stat.exists
  block:

    - name: Download Prometheus
      ansible.builtin.get_url:
        url: "{{ prometheus_download_url }}"
        dest: "{{ prometheus_tmp_dir }}/{{ prometheus_archive }}"

    - name: Extract Prometheus
      ansible.builtin.unarchive:
        src: "{{ prometheus_tmp_dir }}/{{ prometheus_archive }}"
        dest: "{{ prometheus_tmp_dir }}"
        remote_src: true

    - name: Install Prometheus binaries
      ansible.builtin.copy:
        src: "{{ prometheus_extract_dir }}/{{ item }}"
        dest: "{{ prometheus_bin_dir }}/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      loop:
        - prometheus
        - promtool

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "{{ prometheus_tmp_dir }}/{{ prometheus_archive }}"
        state: absent

    - name: Remove extracted files
      ansible.builtin.file:
        path: "{{ prometheus_extract_dir }}"
        state: absent