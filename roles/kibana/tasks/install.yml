---
- name: Check installed kibana version
  ansible.builtin.command: dpkg-query -W -f='${Version}' kibana
  register: kibana_installed
  changed_when: false
  failed_when: false

- name: Install Kibana (skip if already at pinned version)
  when: kibana_installed.stdout is not defined or kibana_version not in kibana_installed.stdout
  block:

    - name: Add Elastic 9.x APT repository
      ansible.builtin.deb822_repository:
        name: "{{ kibana_apt_repo_filename }}"
        types: deb
        uris: "{{ kibana_apt_uri }}"
        suites: "{{ kibana_apt_suite }}"
        components: "{{ kibana_apt_components }}"
        signed_by: "{{ kibana_gpg_key_url }}"
        state: present
      register: kibana_apt_repo_result

    - name: Update apt cache after adding Elastic repo
      ansible.builtin.apt:
        update_cache: true
      when: kibana_apt_repo_result.changed

    - name: Find exact apt candidate matching pinned version
      ansible.builtin.shell: >-
        apt-cache madison kibana
        | awk '{print $3}'
        | grep -E "^{{ kibana_version }}(-|$)"
        | head -n1
      register: kibana_apt_candidate
      changed_when: false

    - name: Fail if pinned version is not available in the repo
      ansible.builtin.fail:
        msg: >-
          kibana {{ kibana_version }} was not found via apt-cache madison.
          Confirm it matches a version actually published to the 9.x apt repo,
          and that it matches elastic_version exactly.
      when: kibana_apt_candidate.stdout | length == 0

    - name: Install Kibana at pinned version
      ansible.builtin.apt:
        name: "kibana={{ kibana_apt_candidate.stdout }}"
        state: present
      notify: Restart Kibana

    - name: Hold kibana package at pinned version
      ansible.builtin.dpkg_selections:
        name: kibana
        selection: hold
      when: kibana_hold_package
