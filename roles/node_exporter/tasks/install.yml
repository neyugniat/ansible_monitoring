---
- name: Check if Node Exporter is installed
  ansible.builtin.stat:
    path: "{{ node_exporter_bin_dir }}/node_exporter"
  register: node_exporter_binary

- name: Install Node Exporter
  when: not node_exporter_binary.stat.exists
  block:

    - name: Download Node Exporter
      ansible.builtin.get_url:
        url: "{{ node_exporter_download_url }}"
        dest: "{{ node_exporter_tmp_dir }}/{{ node_exporter_archive }}"
        mode: "0644"
        force: false

    - name: Extract Node Exporter archive
      ansible.builtin.unarchive:
        src: "{{ node_exporter_tmp_dir }}/{{ node_exporter_archive }}"
        dest: "{{ node_exporter_tmp_dir }}"
        remote_src: true

    - name: Install Node Exporter binary
      ansible.builtin.copy:
        src: "{{ node_exporter_extract_dir }}/node_exporter"
        dest: "{{ node_exporter_bin_dir }}/node_exporter"
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "{{ node_exporter_tmp_dir }}/{{ node_exporter_archive }}"
        state: absent

    - name: Remove extracted directory
      ansible.builtin.file:
        path: "{{ node_exporter_extract_dir }}"
        state: absent